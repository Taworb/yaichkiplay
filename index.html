<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaichki Play</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #222222;
      --accent: #ff3232; --text: #f0f0f0; --muted: #555; --hover-bg: #181818;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 60px 24px 80px; overflow-x: hidden;
    }

    /* 1. НОВОЕ ЧИСТОЕ РАЗМЫТИЕ */
    .cursor-glow {
      position: fixed;
      top: 0; left: 0;
      width: 450px; /* Уменьшили физический размер */
      height: 450px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      /* opacity регулирует общую яркость */
      opacity: 0.12; 
      /* filter: blur создает тот самый идеально мягкий край */
      filter: blur(80px); 
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    header { width: 100%; max-width: 680px; margin-bottom: 64px; animation: fadeUp 0.6s ease both; position: relative; z-index: 2; }
    .logo { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
    h1 { font-size: clamp(40px, 8vw, 72px); font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
    h1 span { color: var(--accent); }
    .subtitle { margin-top: 12px; font-size: 14px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .sub-link { color: var(--muted); text-decoration: none; transition: color 0.15s; }
    .sub-link:hover { color: var(--accent); }

    .grid { width: 100%; max-width: 680px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; position: relative; z-index: 2; }

    .panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 32px 28px; text-decoration: none; color: var(--text);
      display: flex; flex-direction: column; gap: 10px;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      animation: fadeUp 0.5s ease both; cursor: pointer; position: relative;
    }
    .panel:hover { background: var(--hover-bg); border-color: var(--accent); transform: translateY(-2px); }

    /* 2. БЛИКИ НА РАМКАХ (срабатывают только рядом) */
    .panel::after {
      content: "";
      position: absolute;
      inset: -1px;
      padding: 1px;
      border-radius: 4px;
      background: radial-gradient(
        250px circle at var(--mouse-x) var(--mouse-y),
        rgba(255, 50, 50, 0.4), 
        transparent 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      pointer-events: none;
    }

    .panel-icon { font-size: 28px; margin-bottom: 4px; }
    .panel-title { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
    .panel-desc { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.5; }
    .panel-arrow { position: absolute; top: 20px; right: 20px; color: var(--border); font-size: 18px; transition: color 0.15s, transform 0.15s; }
    .panel:hover .panel-arrow { color: var(--accent); transform: translate(2px, -2px); }

    footer { margin-top: 64px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); animation: fadeUp 0.8s ease both; }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
