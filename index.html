<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaichki Play</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #ff3232;
      --text: #f0f0f0;
      --muted: #555;
      --hover-bg: #181818;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 56px;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .file-list {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      animation: fadeUp 0.5s ease both;
      cursor: pointer;
    }

    .file-card:hover {
      background: var(--hover-bg);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .file-card:hover .dl-icon { color: var(--accent); }

    .file-info { display: flex; align-items: center; gap: 16px; }

    .file-icon {
      width: 36px;
      height: 36px;
      border-radius: 3px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .file-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .file-ext {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 3px;
    }

    .dl-icon {
      color: var(--muted);
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
      margin-top: 5px;
    }
    .badge-neoforge { background: #1a1a3a; color: #7b9fff; border: 1px solid #2a2a5a; }
    .badge-forge    { background: #3a2200; color: #ff9a3c; border: 1px solid #5a3800; }
    .badge-fabric   { background: #1a2a1a; color: #6ddc6d; border: 1px solid #2a4a2a; }

    /* loading & states */
    .state {
      width: 100%;
      max-width: 680px;
      padding: 48px 0;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      animation: fadeUp 0.4s ease both;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }

    .empty-icon { font-size: 32px; margin-bottom: 12px; }

    footer {
      margin-top: 64px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      animation: fadeUp 0.8s ease both;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">// скачивание</div>
    <h1>Yaichki <span>Play</span></h1>
    <div class="subtitle">моды · taworb</div>
  </header>

  <div class="file-list" id="list">
    <div class="state" id="status">
      <div class="spinner"></div>
      загрузка файлов...
    </div>
  </div>

  <footer>
    <a href="https://github.com/taworb/yaichkiplay" target="_blank">github.com/taworb/yaichkiplay</a>
  </footer>

  <script>
    const OWNER  = 'taworb';
    const REPO   = 'yaichkiplay';
    const BRANCH = 'main';

    function getLoader(name) {
      const lower = name.toLowerCase();
      if (lower.includes('neoforge')) return 'neoforge';
      if (lower.includes('forge'))    return 'forge';
      if (lower.includes('fabric'))   return 'fabric';
      return null;
    }

    function getExt(name) {
      const parts = name.split('.');
      return parts.length > 1 ? parts.pop().toLowerCase() : '—';
    }

    function stripExt(name) {
      const ext = getExt(name);
      if (ext === '—') return name;
      return name.slice(0, -(ext.length + 1));
    }

    async function loadFiles() {
      const list   = document.getElementById('list');
      const status = document.getElementById('status');

      try {
        const res = await fetch('files.json');
        if (!res.ok) throw new Error('files.json не найден');
        const files = await res.json();

        status.remove();

        if (!files.length) {
          list.innerHTML = `
            <div class="state">
              <div class="empty-icon">📭</div>
              файлы ещё не добавлены
            </div>`;
          return;
        }

        files.forEach((name, i) => {
          const ext      = getExt(name);
          const baseName = stripExt(name);
          const loader   = getLoader(name);
          const url      = `https://github.com/${OWNER}/${REPO}/raw/${BRANCH}/${name}`;

          const card = document.createElement('a');
          card.className = 'file-card';
          card.href      = url;
          card.download  = name;
          card.style.animationDelay = `${i * 0.07}s`;

          const badgeHTML = loader
            ? `<span class="badge badge-${loader}">${loader}</span>`
            : '';

          card.innerHTML = `
            <div class="file-info">
              <div class="file-icon">${ext}</div>
              <div>
                <div class="file-name">${baseName}</div>
                <div class="file-ext">${name}</div>
                ${badgeHTML}
              </div>
            </div>
            <svg class="dl-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          `;

          list.appendChild(card);
        });

      } catch (err) {
        status.innerHTML = `
          <div class="empty-icon">⚠️</div>
          не удалось загрузить список файлов<br>
          <span style="font-size:11px;margin-top:8px;display:block">${err.message}</span>
        `;
      }
    }

    loadFiles();
  </script>
</body>
</html>
