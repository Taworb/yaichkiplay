<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaichki Play — Моды</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #222222;
      --accent: #ff3232; --text: #f0f0f0; --muted: #555; --hover-bg: #181818;
      --mouse-x: 50%; --mouse-y: 50%;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 24px 80px; overflow-x: hidden; }
    header { width: 100%; max-width: 680px; margin-bottom: 56px; animation: fadeUp 0.6s ease both; position: relative; z-index: 10; }
    .logo { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
    h1 { font-size: clamp(40px, 8vw, 72px); font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
    h1 span { color: var(--accent); }

    .file-list { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 2px; position: relative; z-index: 10; }
    .file-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; text-decoration: none; color: var(--text);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      animation: fadeUp 0.5s ease both; cursor: pointer; position: relative;
    }
    .file-card:hover { background: var(--hover-bg); border-color: var(--accent); transform: translateX(4px); }
    
    .file-card::before {
      content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
      background: radial-gradient(350px circle at var(--mouse-x) var(--mouse-y), rgba(255, 50, 50, 0.4), transparent 45%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude; pointer-events: none;
    }

    .file-info { display: flex; align-items: center; gap: 16px; }
    .file-icon { width: 36px; height: 36px; border-radius: 3px; background: #1a1a1a; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
    .file-name { font-size: 15px; font-weight: 700; }
    .badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 7px; border-radius: 3px; margin-top: 5px; text-transform: uppercase; }
    .badge-fabric { background: #1a2a1a; color: #6ddc6d; border: 1px solid #2a4a2a; }

    #cursor-glow {
      position: fixed; top: 0; left: 0; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255, 50, 50, 0.08) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none; z-index: 1; filter: blur(80px); transform: translate(-50%, -50%); will-change: transform;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="cursor-glow"></div>
  <header>
    <a class="back-btn" href="./" style="color:var(--muted);text-decoration:none;font-family:'DM Mono';font-size:12px;display:block;margin-bottom:24px;">← назад</a>
    <div class="logo">// моды</div>
    <h1>Yaichki <span>Play</span></h1>
  </header>

  <div class="file-list" id="list">
    <div class="state" id="status" style="text-align:center;padding:48px;color:var(--muted);font-family:'DM Mono'">загрузка файлов...</div>
  </div>

  <script>
    const OWNER = 'taworb'; const REPO = 'yaichkiplay'; const BRANCH = 'main';
    async function loadFiles() {
      const list = document.getElementById('list');
      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`);
        const data = await res.json();
        const files = (data.tree || []).filter(item => item.type === 'blob' && item.path.startsWith('mods/'));
        document.getElementById('status').remove();
        files.forEach((file, i) => {
          const name = file.path.split('/').pop();
          const card = document.createElement('a');
          card.className = 'file-card';
          card.href = `https://github.com/${OWNER}/${REPO}/raw/${BRANCH}/${file.path}`;
          card.innerHTML = `<div class="file-info"><div class="file-icon">JAR</div><div><div class="file-name">${name}</div></div></div>`;
          list.appendChild(card);
        });
      } catch (err) { document.getElementById('status').innerText = 'Ошибка загрузки'; }
    }
    loadFiles();

    document.addEventListener('mousemove', (e) => {
      const glow = document.getElementById('cursor-glow');
      if (glow) glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
      document.querySelectorAll('.file-card').forEach(card => {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
        card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
      });
    });
  </script>
</body>
</html>
