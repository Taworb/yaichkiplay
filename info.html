<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaichki Play — Инфо</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #222222;
      --accent: #ff3232; --text: #f0f0f0; --muted: #555; --hover-bg: #181818;
      --mouse-x: 0px; --mouse-y: 0px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 24px 80px; overflow-x: hidden; }
    header { width: 100%; max-width: 680px; margin-bottom: 48px; position: relative; z-index: 10; }
    .logo { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-size: 32px; font-weight: 800; }
    .back-link { display: inline-block; margin-top: 16px; color: var(--muted); text-decoration: none; font-size: 13px; font-family: 'DM Mono', monospace; }

    .content-wrapper { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 32px; position: relative; z-index: 10; }
    
    .info-block { 
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 28px;
      position: relative; transition: 0.15s;
    }
    .info-block:hover { border-color: var(--accent); background: var(--hover-bg); }

    .info-block::before, .link-card::before {
      content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
      background: radial-gradient(350px circle at var(--mouse-x) var(--mouse-y), rgba(255, 50, 50, 0.45), transparent 45%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; z-index: 2;
    }

    .block-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; }
    .ip-box { background: var(--bg); border: 1px solid var(--border); padding: 12px 16px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-family: 'DM Mono', monospace; cursor: pointer; transition: 0.15s; }
    .ip-box:hover { border-color: var(--muted); }

    .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .link-card { 
      background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 4px;
      display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: inherit; transition: 0.15s; position: relative;
    }
    .link-card:hover { border-color: var(--accent); background: var(--hover-bg); }

    #cursor-glow {
      position: fixed; top: 0; left: 0; width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(255, 50, 50, 0.1) 0%, rgba(255, 50, 50, 0.02) 40%, transparent 70%);
      border-radius: 50%; pointer-events: none; z-index: -1; filter: blur(80px); transform: translate(-50%, -50%); will-change: transform;
    }
  </style>
</head>
<body>
  <div id="cursor-glow"></div>
  <header>
    <div class="logo">// инфо</div>
    <h1>О сервере</h1>
    <a href="/" class="back-link">← назад</a>
  </header>

  <div class="content-wrapper">
    <div class="info-block">
      <div class="block-title">Подключение</div>
      <div class="ip-box" onclick="copyIP()">
        <span>play.yaichki.fun</span>
        <span style="color:var(--muted); font-size: 11px;">TAP TO COPY</span>
      </div>
    </div>

    <div class="links-grid">
      <a href="#" class="link-card"><span>Discord</span><span>↗</span></a>
      <a href="#" class="link-card"><span>Telegram</span><span>↗</span></a>
    </div>
  </div>

  <script>
    const glow = document.getElementById('cursor-glow');
    let mX = 0, mY = 0, gX = 0, gY = 0;
    document.addEventListener('mousemove', (e) => {
      mX = e.clientX; mY = e.clientY;
      document.querySelectorAll('.info-block, .link-card').forEach(card => {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
        card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
      });
    });
    function anim() {
      gX += (mX - gX) * 0.08; gY += (mY - gY) * 0.08;
      glow.style.transform = `translate(${gX}px, ${gY}px) translate(-50%, -50%)`;
      requestAnimationFrame(anim);
    }
    anim();
    function copyIP() { /* логика копирования */ }
  </script>
</body>
</html>
