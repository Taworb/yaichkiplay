<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaichki Play — Инфо</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #222222;
      --accent: #ff3232; --text: #f0f0f0; --muted: #555; --hover-bg: #181818;
      --mouse-x: 50%; --mouse-y: 50%;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 24px 80px; overflow-x: hidden; }
    header { width: 100%; max-width: 680px; margin-bottom: 56px; animation: fadeUp 0.6s ease both; position: relative; z-index: 10; }
    .content { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 10; }
    
    .info-block, .link-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 28px; animation: fadeUp 0.5s ease both; position: relative; transition: border-color 0.15s; }
    .info-block:hover, .link-card:hover { border-color: var(--accent); }

    .info-block::before, .link-card::before {
      content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
      background: radial-gradient(350px circle at var(--mouse-x) var(--mouse-y), rgba(255, 50, 50, 0.4), transparent 45%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude; pointer-events: none;
    }

    .info-value.ip { font-family: 'DM Mono', monospace; color: var(--accent); cursor: pointer; }
    #cursor-glow {
      position: fixed; top: 0; left: 0; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255, 50, 50, 0.08) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none; z-index: 1; filter: blur(80px); transform: translate(-50%, -50%); will-change: transform;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="cursor-glow"></div>
  <header>
    <a href="./" style="color:var(--muted);text-decoration:none;font-family:'DM Mono';font-size:12px;">← назад</a>
    <h1>Yaichki <span>Play</span></h1>
  </header>

  <div class="content">
    <div class="info-block">
      <div class="info-row"><span class="info-label">IP адрес</span><div class="info-value ip" onclick="copyIP(this)">yaichki.playingfor.fun</div></div>
    </div>
  </div>

  <script>
    function copyIP(el) { navigator.clipboard.writeText('yaichki.playingfor.fun'); }
    document.addEventListener('mousemove', (e) => {
      const glow = document.getElementById('cursor-glow');
      if (glow) glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
      document.querySelectorAll('.info-block, .link-card').forEach(card => {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
        card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
      });
    });
  </script>
</body>
</html>
